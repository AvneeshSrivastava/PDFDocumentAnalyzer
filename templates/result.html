{% extends "base.html" %}

{% block content %}

<div class="container">

    <h2 class="mb-4">📊 PDF Analysis Dashboard</h2>

    <div class="row g-3">

        <!-- LEFT PANEL -->
        <div class="col-lg-4 col-12">

            <div class="card shadow-sm mb-3">

                <div class="card-header fw-semibold">
                    <i class="bi bi-file-earmark-pdf me-2"></i>
                    PDF Information
                </div>

                <div class="card-body">

                    <div class="row text-center">

                        <div class="col-6 text-center">

                            <small class="text-muted">Pages</small>

                            <h3 class="fw-bold">
                                {{ metadata.page_count }}
                            </h3>

                        </div>

                        <div class="col-6 text-center">

                            <small class="text-muted">Size</small>

                            <h3 class="fw-bold text-nowrap">
                                {{ metadata.file_size_mb }} MB
                            </h3>

                        </div>
                    </div>
                </div>

            </div>

            <div class="card shadow-sm">

                <div class="card-header fw-semibold">

                    <i class="bi bi-search me-2"></i>

                    Search Keyword

                </div>

                <div class="card-body">

                    <p class="text-muted">

                        Search any keyword inside the extracted PDF.

                    </p>

                    <form action="/search" method="post">

                        <div class="mb-3">

                            <input class="form-control" name="keyword" placeholder="Enter keyword..." required>

                        </div>

                        <button class="btn btn-primary w-100">

                            <i class="bi bi-search me-2"></i>

                            Search

                        </button>

                    </form>

                </div>

            </div>

        </div>

        <!-- RIGHT PANEL -->
        <div class="col-lg-8 col-12">

            <div class="card shadow-sm h-100">

                <div class="card-header text-center">

                    <h4 class="fw-bold mb-0">
                        <i class="bi bi-file-text me-2"></i>
                        Extracted Text
                    </h4>

                </div>

                <div class="card-body">

                    <div class="document-viewer">

                        {{ extracted_text }}

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
