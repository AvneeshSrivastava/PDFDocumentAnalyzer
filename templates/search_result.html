{% block content %}

<div class="container py-4">

    <div class="card shadow-sm p-3 mb-4 text-center">

        <h3>Search Result</h3>

        <p><strong>Keyword:</strong> {{ keyword }}</p>
        <p><strong>Occurrences:</strong> {{ count }}</p>

        <a href="/" class="btn btn-primary mt-2">
            Upload Another PDF
        </a>

    </div>

    <div class="card shadow-sm p-3">

        <h5 class="mb-3">Highlighted Text</h5>

        <div style="max-height: 70vh; overflow-y: auto; white-space: pre-wrap;">
            {{ highlighted_text | safe }}
        </div>

    </div>

</div>

{% endblock %}
