<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{% block title %}PDF Analyzer{% endblock %}</title>

    <!-- Bootstrap ONLY ONCE -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', path='css/site.css') }}">
</head>

<body>

    <nav class="navbar navbar-dark bg-dark shadow-sm">
        <div class="container-fluid">
            <button id="sidebar-toggle" class="btn btn-outline-light me-3">
                <i class="bi bi-list"></i>
            </button>
            <a class="navbar-brand fw-bold" href="/" id="sidebar">
                <i class="bi bi-file-earmark-pdf-fill me-2"></i>
                PDF Document Analyzer
            </a>

            <span class="text-light small">
                AI ML Road Map
            </span>

        </div>
    </nav>

    <div class="container-fluid d-flex justify-content-between align-items-center">

        <div class="row">

            <!-- Sidebar -->
            <aside class="col-md-3 col-lg-2 bg-dark text-white min-vh-100 p-3">

                <h5 class="mb-4">Navigation</h5>

                <div class="d-grid gap-2">

                    <a href="/" class="btn btn-outline-light text-start d-flex align-items-center">
                        <i class="bi bi-upload"></i>
                        <span class="ms-2">Upload PDF</span>
                    </a>

                    <a href="/health" class="btn btn-outline-light text-start d-flex align-items-center">
                        <i class="bi bi-heart-pulse"></i>
                        <span class="ms-2">Health</span>
                    </a>

                </div>

            </aside>

            <!-- Main Content -->
            <main class="col-md-9 col-lg-10 bg-light p-4" id="main-content">

                {% block content %}
                {% endblock %}

            </main>

        </div>

    </div>

    <script src="{{ url_for('static', path='js/site.js') }}"></script>

</body>

</html>
