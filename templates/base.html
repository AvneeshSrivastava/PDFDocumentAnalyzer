<!DOCTYPE html>
<html lang="en">

<head>
    <!-- ==========================================================
         Meta Information
    =========================================================== -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- ==========================================================
         Page Title
    =========================================================== -->
    <title>
        {% block title %}
        PDF Document Analyzer
        {% endblock %}
    </title>
    <!-- ==========================================================
         Bootstrap CSS
    =========================================================== -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- ==========================================================
         Bootstrap Icons
    =========================================================== -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- ==========================================================
         Application Stylesheet
    =========================================================== -->
    <link rel="stylesheet" href="{{ url_for('static', path='css/site.css') }}">
</head>

<body>
    <!-- ==========================================================
         Navigation Bar
    =========================================================== -->
    <nav class="navbar navbar-dark bg-dark shadow-sm">
        <div class="container-fluid">
            <!-- Sidebar Toggle Button -->
            <button id="sidebar-toggle" class="btn btn-outline-light sidebar-toggle-btn">
                <i class="bi bi-list"></i>
            </button>
            <!-- Application Logo -->
            <a href="/" class="navbar-brand fw-bold">
                <i class="bi bi-file-earmark-pdf-fill me-2"></i>
                PDF Document Analyzer
            </a>
            <!-- Project Name -->
            <span class="text-light">
                AI ML Road Map
            </span>
        </div>
    </nav>
    <!-- ==========================================================
         Main Application Layout
    =========================================================== -->
    <div id="layout">
        <!-- ======================================================
             Sidebar Navigation
        ======================================================= -->
        <aside id="sidebar">
            <h4 class="mb-4">
                Navigation
            </h4>
            <div class="d-grid gap-2">
                <!-- Upload PDF -->
                <a href="/" class="btn btn-outline-light text-start" data-bs-toggle="tooltip" data-bs-placement="right">
                    <i class="bi bi-upload me-2"></i>
                    <span>Upload PDF</span>
                </a>
                <!-- Health Check -->
                <a href="/health" class="btn btn-outline-light text-start" data-bs-toggle="tooltip"
                    data-bs-placement="right">
                    <i class="bi bi-heart-pulse me-2"></i>
                    <span>Health</span>
                </a>
            </div>
        </aside>
        <!-- ======================================================
             Main Content Area
        ======================================================= -->
        <main id="main-content">
            {% block content %}
            {% endblock %}
        </main>
    </div>
    <!-- ==========================================================
         Application JavaScript
    =========================================================== -->
    <script src="{{ url_for('static', path='js/site.js') }}"></script>
</body>

</html>
