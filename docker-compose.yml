# ==========================================================
# Docker Compose Configuration
# ==========================================================

services:

  # ========================================================
  # PDF Document Analyzer Service
  # ========================================================

  pdf-document-analyzer:

    build:
      context: .
      dockerfile: Dockerfile

    container_name: pdf-document-analyzer

    ports:
      - "8000:8000"

    restart: unless-stopped

    environment:
      PYTHONUNBUFFERED: 1